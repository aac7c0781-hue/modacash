<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModaCash Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f0f0f;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .login-box{
      width:350px;
      background:#1b1b1b;
      padding:35px;
      border-radius:15px;
      box-shadow:0 0 20px rgba(255,215,0,0.2);
    }

    .logo{
      text-align:center;
      margin-bottom:30px;
    }

    .logo h1{
      color:gold;
      font-size:42px;
    }

    .logo p{
      color:#999;
      margin-top:5px;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#2a2a2a;
      color:white;
      font-size:15px;
    }

    .input-group input:focus{
      outline:none;
      border:1px solid gold;
    }

    .login-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:gold;
      color:black;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
    }

    .login-btn:hover{
      opacity:0.8;
    }

    .bottom-text{
      text-align:center;
      margin-top:20px;
      color:#aaa;
    }

    .bottom-text a{
      color:gold;
      text-decoration:none;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <div class="logo">
      <h1>ModaCash</h1>
      <p>Login To Your Account</p>
    </div>

    <form>

      <div class="input-group">
        <input type="email" placeholder="Email Address" required>
      </div>

      <div class="input-group">
        <input type="password" placeholder="Password" required>
      </div>

      <button class="login-btn">
        Login
      </button>

    </form>

    <div class="bottom-text">
      Don't have account?
      <a href="register.html">Register</a>
    </div>

  </div>

</body>
</html>
