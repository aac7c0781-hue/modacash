<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ModaCash Register</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f0f0f;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
    }

    .register-box{
      width:350px;
      background:#1a1a1a;
      padding:30px;
      border-radius:15px;
      box-shadow:0 0 20px rgba(255,215,0,0.2);
    }

    .logo{
      text-align:center;
      margin-bottom:25px;
    }

    .logo h1{
      color:gold;
      font-size:40px;
    }

    .logo p{
      color:#aaa;
      margin-top:5px;
    }

    .input-group{
      margin-bottom:15px;
    }

    .input-group input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#2a2a2a;
      color:white;
      font-size:15px;
    }

    .input-group input:focus{
      outline:none;
      border:1px solid gold;
    }

    .register-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:gold;
      color:black;
      font-size:17px;
      cursor:pointer;
      font-weight:bold;
      margin-top:10px;
    }

    .register-btn:hover{
      opacity:0.8;
    }

    .login-link{
      text-align:center;
      margin-top:20px;
      color:#aaa;
    }

    .login-link a{
      color:gold;
      text-decoration:none;
    }
  </style>
</head>

<body>

  <div class="register-box">

    <div class="logo">
      <h1>ModaCash</h1>
      <p>Create Your Account</p>
    </div>

    <form>

      <div class="input-group">
        <input type="text" placeholder="Username" required>
      </div>

      <div class="input-group">
        <input type="email" placeholder="Email Address" required>
      </div>

      <div class="input-group">
        <input type="password" placeholder="Password" required>
      </div>

      <button class="register-btn">
        Register
      </button>

    </form>

    <div class="login-link">
      Already have account?
      <a href="#">Login</a>
    </div>

  </div>

</body>
</html>
