<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الأدمن - ModaCash</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
display:flex;
}

.sidebar{
width:250px;
height:100vh;
background:#1a1a1a;
padding:20px;
}

.sidebar h2{
color:gold;
margin-bottom:30px;
text-align:center;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px;
margin-bottom:10px;
background:#222;
border-radius:10px;
transition:0.3s;
}

.sidebar a:hover{
background:gold;
color:black;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1b1b1b;
padding:25px;
border-radius:15px;
text-align:center;
}

.card h3{
color:gold;
margin-bottom:10px;
}

.table-box{
background:#1b1b1b;
padding:20px;
border-radius:15px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

table th,
table td{
padding:15px;
border-bottom:1px solid #333;
text-align:center;
}

table th{
color:gold;
}

.btn{
padding:8px 15px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.approve{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>ModaCash</h2>

<a href="#">الرئيسية</a>
<a href="#">المستخدمين</a>
<a href="#">الإيداعات</a>
<a href="#">السحوبات</a>
<a href="#">الإعلانات</a>
<a href="#">VIP</a>
<a href="#">الإشعارات</a>
<a href="#">تسجيل خروج</a>

</div>

<div class="main">

<div class="cards">

<div class="card">
<h3>عدد المستخدمين</h3>
<p>1,245</p>
</div>

<div class="card">
<h3>إجمالي الأرباح</h3>
<p>$12,540</p>
</div>

<div class="card">
<h3>طلبات السحب</h3>
<p>54</p>
</div>

<div class="card">
<h3>الإعلانات النشطة</h3>
<p>18</p>
</div>

</div>

<div class="table-box">

<h2 style="margin-bottom:20px;color:gold;">
طلبات السحب
</h2>

<table>

<tr>
<th>المستخدم</th>
<th>المبلغ</th>
<th>المحفظة</th>
<th>الحالة</th>
<th>إجراء</th>
</tr>

<tr>
<td>Ahmed</td>
<td>$120</td>
<td>TX92XXX...</td>
<td>Pending</td>
<td>
<button class="btn approve">
قبول
</button>

<button class="btn reject">
رفض
</button>
</td>
</tr>

<tr>
<td>Ali</td>
<td>$80</td>
<td>TX11XXX...</td>
<td>Pending</td>
<td>
<button class="btn approve">
قبول
</button>

<button class="btn reject">
رفض
</button>
</td>
</tr>

</table>

</div>

</div>

</body>
</html>
