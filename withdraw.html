<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السحب - ModaCash</title>

<style>

body{
background:#0f0f0f;
font-family:Arial;
color:white;
padding:20px;
direction:rtl;
}

.box{
background:#1b1b1b;
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
}

h1{
color:gold;
text-align:center;
}

input{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:gold;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h1>السحب</h1>

<input type="number" placeholder="مبلغ السحب">

<input type="text" placeholder="عنوان المحفظة">

<button>
طلب سحب
</button>

</div>

</body>
</html>
